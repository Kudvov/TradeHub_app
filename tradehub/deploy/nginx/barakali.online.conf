# Nginx: домен barakali.online → Node (SvelteKit) на 127.0.0.1:3000
#
# Установка на сервере:
#   sudo cp /opt/teleposter/deploy/nginx/barakali.online.conf /etc/nginx/sites-available/barakali.online
#   sudo ln -sf /etc/nginx/sites-available/barakali.online /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (после того как DNS A-запись заработала):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d barakali.online -d www.barakali.online

# Редирект www → основной домен (без www)
server {
	listen 80;
	listen [::]:80;
	server_name www.barakali.online;
	return 301 http://barakali.online$request_uri;
}

server {
	listen 80;
	listen [::]:80;
	server_name barakali.online;

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}
}
