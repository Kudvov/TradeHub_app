# Nginx: домен teleposter.online → Node (SvelteKit) на 127.0.0.1:3000
#
# Установка на сервере:
#   cp /opt/teleposter/deploy/nginx/teleposter.online.conf /etc/nginx/sites-available/teleposter.online
#   ln -sf /etc/nginx/sites-available/teleposter.online /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# HTTPS (после того как DNS A-запись заработала):
#   apt-get install -y certbot python3-certbot-nginx
#   certbot --nginx -d teleposter.online -d www.teleposter.online

# Редирект www → основной домен
server {
	listen 80;
	listen [::]:80;
	server_name www.teleposter.online;
	return 301 http://teleposter.online$request_uri;
}

server {
	listen 80;
	listen [::]:80;
	server_name teleposter.online;

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}
}
