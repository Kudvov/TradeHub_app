services:
  db:
    image: postgres:16-alpine
    container_name: teleposter-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: teleposter
      POSTGRES_PASSWORD: teleposter
      POSTGRES_DB: teleposter
    volumes:
      - teleposter_pgdata:/var/lib/postgresql/data

volumes:
  teleposter_pgdata:
