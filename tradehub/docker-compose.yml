services:
  db:
    image: postgres:16-alpine
    container_name: tradehub-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tradehub
      POSTGRES_PASSWORD: tradehub
      POSTGRES_DB: tradehub
    volumes:
      - tradehub_pgdata:/var/lib/postgresql/data

volumes:
  tradehub_pgdata:
